spring:
  application:
    name: paastestBusiness
  datasource:
    url: jdbc:mysql://localhost:3306/paastest?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 0000
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace