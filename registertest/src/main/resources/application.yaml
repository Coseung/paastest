spring:
  application:
    name: registertest
  datasource:
    url: jdbc:mysql://localhost:3306/auth?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: Auth
    password: "0000"
    driver-class-name: com.mysql.cj.jdbc.Driver

    sql:
      init:
        mode: always
        encoding: UTF-8
    jpa:
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          format_sql: true
          show_sql: true
      database-platform: org.hibernate.dialect.MySQLDialect

  logging:
    level:
      org.hibernate.SQL: debug
      org.hibernate.orm.jdbc.bind: trace


  config:
    import:
      - optional:file:src/main/resources/application-secret.yaml
    # Access Token 유효 시간 (밀리초 단위)
    # 1,800,000 ms = 30분 (60초 * 30분 * 1000ms)
    access-token-expiration: 1800000